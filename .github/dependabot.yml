version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels: [dependencies, npm]
    commit-message:
      prefix: deps
      include: scope
    groups:
      npm-minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # Match the Node typings to engines.node >=22.19.0: allow 22.19.x patch
      # updates, but do not let Dependabot widen to newer Node minors or majors
      # where TypeScript could accept APIs missing from the runtime floor.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: ci
      include: scope
