changelog:
  categories:
    - title: Security
      labels: [security]
    - title: Compatibility
      labels: [compatibility]
    - title: Added
      labels: [enhancement]
    - title: Fixed
      labels: [bug]
    - title: Documentation
      labels: [documentation]
    - title: Dependencies
      labels: [dependencies]
    - title: Other changes
      labels: ["*"]
  exclude:
    labels: [skip-changelog]
