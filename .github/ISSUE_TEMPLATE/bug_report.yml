name: Bug report
description: Report a reproducible Claudex defect.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never include OAuth tokens, API keys, callback URLs, account identifiers, prompt bodies, or raw authorization headers. Report vulnerabilities privately through SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide minimal, sanitized steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: Claudex, Claude Code, CLIProxyAPI
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Linux, macOS, Windows, WSL, Other]
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I removed every credential, callback URL, account identifier, prompt, and raw header.
          required: true
        - label: I searched for an existing issue.
          required: true
