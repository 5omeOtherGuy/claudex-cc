name: Feature request
description: Propose a user-facing Claudex capability.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user outcome should this enable?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What current limitation motivates the request?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: List observable acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility considerations
